<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>麻雀点棒管理</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="点棒管理">
<link rel="apple-touch-icon" href="icon-192.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a1a0f;--felt:#0d2a18;--surface:#1a2a3a;--card:#1e3248;--border:#2e4a68;
  --primary:#3498db;--success:#2ecc71;--danger:#e74c3c;--warn:#f1c40f;
  --silver:#95a5a6;--bronze:#c0773a;--text:#ecf0f1;--muted:#6e8a9e;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;font-size:16px;overflow-x:hidden}
#app{min-height:100vh;max-width:500px;margin:0 auto}

.hdr{background:var(--surface);padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30}
.hdr-title{font-size:17px;font-weight:700}
.hdr-btn{background:none;border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;min-width:52px;text-align:center}
.hdr-btn:active{opacity:.6}

.body{padding:12px 14px;padding-bottom:calc(90px + env(safe-area-inset-bottom))}
.sec{margin-bottom:16px}
.sec-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border)}

.btn{display:flex;align-items:center;justify-content:center;gap:5px;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;padding:14px 18px;width:100%;transition:opacity .15s,transform .1s}
.btn:active{opacity:.75;transform:scale(.98)}
.btn:disabled{opacity:.35;pointer-events:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-warn{background:var(--warn);color:#000}
.btn-sm{font-size:13px;padding:9px 14px;border-radius:8px;width:auto}

.tgl{display:flex;background:#050f08;border-radius:10px;padding:4px;gap:4px}
.tgl-btn{flex:1;padding:9px 8px;border:none;background:none;color:var(--muted);border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s}
.tgl-btn.on{background:var(--primary);color:#fff}
.tgl-btn:active{opacity:.7}

.inp{background:#050f08;border:1px solid var(--border);border-radius:9px;color:var(--text);padding:11px 14px;font-size:16px;width:100%;outline:none;appearance:none}
.inp:focus{border-color:var(--primary)}
.lbl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}

.preset-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.preset-btn{padding:9px 12px;border:2px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;line-height:1.3;text-align:center}
.preset-btn.on{border-color:var(--primary);background:rgba(52,152,219,.18);color:var(--primary)}
.preset-btn:active{opacity:.65}
.preset-btn.ml-style{border-color:rgba(241,196,15,.4);color:var(--warn)}
.preset-btn.ml-style.on{border-color:var(--warn);background:rgba(241,196,15,.15)}

.player-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.player-item:last-child{border-bottom:none}
.player-avatar{width:38px;height:38px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-name-r{font-size:14px;font-weight:700}
.player-stats-r{font-size:11px;color:var(--muted);margin-top:1px}
.sel-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;transition:all .15s}
.sel-dot.on{background:var(--success);border-color:var(--success);color:#000}
.seat-badge{background:var(--warn);color:#000;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}

/* Table layout */
.table-wrap{background:var(--felt);border-radius:16px;border:3px solid #0a2012;position:relative;overflow:visible}
.table-inner{display:grid;grid-template-columns:78px 1fr 78px;grid-template-rows:auto 1fr auto;min-height:280px}
.slot-top{grid-column:2;grid-row:1;display:flex;justify-content:center;padding:6px 4px 0}
.slot-bottom{grid-column:2;grid-row:3;display:flex;justify-content:center;padding:0 4px 6px}
.slot-left{grid-column:1;grid-row:2;display:flex;align-items:center;justify-content:center;overflow:visible}
.slot-right{grid-column:3;grid-row:2;display:flex;align-items:center;justify-content:center;overflow:visible}
.slot-center{grid-column:2;grid-row:2;display:flex;align-items:center;justify-content:center;padding:4px}

.pnl{background:rgba(8,18,28,.88);border:1.5px solid rgba(46,74,104,.6);border-radius:10px;padding:6px 9px;min-width:150px;cursor:default}
.pnl.dealer{border-color:var(--warn)}
.pnl.riichi-on{border-color:var(--danger)}
.pnl.naki-on{border-color:var(--primary)}
.pnl-r1{display:flex;align-items:center;gap:4px;margin-bottom:2px;white-space:nowrap}
.pnl-wind{font-size:11px;font-weight:800;color:var(--warn);background:rgba(241,196,15,.15);padding:1px 5px;border-radius:4px}
.pnl-dlr{font-size:10px;color:var(--warn);font-weight:700}
.pnl-name{font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;max-width:72px}
.pnl-rank{font-size:11px;font-weight:800}
.pnl-score{font-size:20px;font-weight:900;letter-spacing:-1px;line-height:1.1;white-space:nowrap}
.pnl-meta{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap}
.pnl-actions{display:flex;gap:4px;margin-top:5px}
.pnl-act{flex:1;padding:5px 2px;border-radius:6px;font-size:10px;font-weight:800;cursor:pointer;border:none;text-align:center}
.pnl-act:active{opacity:.55}
.pnl-r-btn{background:rgba(231,76,60,.15);border:1px solid var(--danger);color:var(--danger)}
.pnl-r-btn.on{background:var(--danger);color:#fff}
.pnl-n-btn{background:rgba(52,152,219,.15);border:1px solid var(--primary);color:var(--primary)}
.pnl-n-btn.on{background:var(--primary);color:#fff}

.pnl-top-wrap{transform:rotate(180deg)}
.pnl-left-wrap{transform:rotate(90deg);width:162px;flex-shrink:0}
.pnl-right-wrap{transform:rotate(-90deg);width:162px;flex-shrink:0}

.tc{background:rgba(4,12,6,.75);border:1px solid rgba(46,74,104,.5);border-radius:12px;padding:9px 10px;text-align:center;min-width:122px}
.tc-round{font-size:15px;font-weight:900;margin-bottom:3px}
.tc-info{display:flex;justify-content:center;gap:10px;margin-bottom:5px}
.tc-cell{text-align:center}
.tc-lbl{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase}
.tc-val{font-size:14px;font-weight:800}
.tc-timer{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:7px;font-variant-numeric:tabular-nums}
.tc-btn{background:var(--success);color:#fff;border:none;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:800;cursor:pointer;width:100%}
.tc-btn:active{opacity:.7}
.tc-ref{background:rgba(255,255,255,.07);border:none;border-radius:6px;padding:4px 8px;font-size:10px;color:var(--muted);cursor:pointer;margin-top:4px;width:100%}

.bnav{display:flex;gap:6px;padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:20}
.bnav .btn{flex:1;padding:13px 6px;font-size:13px}

/* Hand input */
.hi-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;display:flex;flex-direction:column;overflow-y:auto}
.hi-wrap{background:var(--surface);min-height:100%;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.hi-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.hi-back{background:none;border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer}
.hi-title{font-size:18px;font-weight:800}
.hi-lbl{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.type-btn{padding:18px 8px;border:2px solid var(--border);border-radius:13px;background:var(--card);color:var(--text);font-size:15px;font-weight:800;cursor:pointer;text-align:center}
.type-btn.on{border-color:var(--primary);background:rgba(52,152,219,.15)}
.type-btn:active{opacity:.7}
.type-icon{font-size:26px;display:block;margin-bottom:3px}
.hi-players{display:flex;flex-direction:column;gap:7px}
.hi-pb{display:flex;align-items:center;gap:10px;padding:11px 13px;border:2px solid var(--border);border-radius:11px;background:var(--card);cursor:pointer}
.hi-pb:active{opacity:.7}
.hi-pb.sel{border-color:var(--success);background:rgba(46,204,113,.1)}
.hi-pb.sel2{border-color:var(--danger);background:rgba(231,76,60,.1)}
.hi-pb.dis{opacity:.3;pointer-events:none}
.hi-pw{font-size:12px;font-weight:800;color:var(--warn);width:30px;text-align:center}
.hi-pn{font-size:14px;font-weight:700;flex:1}
.hi-ps{font-size:12px;color:var(--muted)}
.hi-pc{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.hi-pb.sel .hi-pc{background:var(--success);border-color:var(--success)}
.hi-pb.sel2 .hi-pc{background:var(--danger);border-color:var(--danger)}
.han-row{display:flex;align-items:center;justify-content:center;gap:18px;margin:10px 0}
.han-adj{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:24px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.han-adj:active{opacity:.6}
.han-val{font-size:36px;font-weight:900;min-width:56px;text-align:center}
.fu-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:14px}
.fu-btn{padding:9px 2px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;text-align:center}
.fu-btn.on{border-color:var(--primary);background:rgba(52,152,219,.2);color:var(--primary)}
.fu-btn:active{opacity:.65}
.mg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.mg-btn{padding:11px 4px;border:2px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font-size:12px;font-weight:800;cursor:pointer;text-align:center}
.mg-btn.on{border-color:var(--warn);background:rgba(241,196,15,.15);color:var(--warn)}
.mg-btn:active{opacity:.65}
.preview-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:14px}
.prev-title{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:9px}
.prev-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.prev-row:last-child{border-bottom:none}
.prev-name{font-size:13px;font-weight:600}
.prev-amt{font-size:14px;font-weight:800}

/* Modals */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:60;display:flex;align-items:flex-end}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));width:100%;max-height:88vh;overflow-y:auto;border-top:1px solid var(--border)}
.score-tbl{width:100%;border-collapse:collapse;font-size:11px}
.score-tbl th{background:var(--card);padding:5px 3px;text-align:center;font-size:10px;color:var(--muted);border:1px solid var(--border)}
.score-tbl td{padding:4px 3px;text-align:center;border:1px solid var(--border);font-size:11px}
.td-d{color:var(--warn);font-weight:700}
.td-m{background:rgba(231,76,60,.1);color:var(--danger);font-weight:800}

.bust-ov{position:fixed;inset:0;background:rgba(120,0,0,.72);z-index:90;display:flex;align-items:center;justify-content:center}
.bust-box{background:#1a0505;border:3px solid var(--danger);border-radius:20px;padding:30px 22px;text-align:center;max-width:290px}
.bust-title{font-size:30px;font-weight:900;color:var(--danger);margin-bottom:6px}
.bust-sub{font-size:15px;margin-bottom:22px}

.result-card{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:13px;padding:13px;margin-bottom:8px;border:1px solid var(--border)}
.result-rank{font-size:26px;width:36px;text-align:center;flex-shrink:0}
.result-body{flex:1;min-width:0}
.result-name{font-size:16px;font-weight:700}
.result-detail{font-size:11px;color:var(--muted);margin-top:2px}
.result-pts{font-size:24px;font-weight:900;flex-shrink:0;text-align:right}
.result-yen{font-size:11px;color:var(--muted);font-weight:600}

.cumul{background:var(--card);border-radius:13px;border:1px solid var(--border);overflow:hidden}
.cumul-row{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--border)}
.cumul-row:last-child{border-bottom:none}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.stat-card{background:var(--card);border-radius:11px;padding:11px;border:1px solid var(--border);text-align:center}
.stat-val{font-size:20px;font-weight:900;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600}
.hist-item{background:var(--card);border-radius:11px;border:1px solid var(--border);padding:11px 13px;margin-bottom:8px}
.hist-meta{font-size:11px;color:var(--muted);margin-bottom:7px}
.hist-ps{display:flex;gap:5px;flex-wrap:wrap}
.hist-p{flex:1;min-width:68px;background:#050f08;border-radius:7px;padding:6px;text-align:center}
.hist-p-rank{font-size:10px;color:var(--muted);font-weight:600}
.hist-p-name{font-size:11px;font-weight:700;margin:1px 0}
.hist-p-pts{font-size:13px;font-weight:800}

/* Shuugi */
.shuugi-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.shuugi-row:last-child{border-bottom:none}
.shuugi-name{font-size:15px;font-weight:700;flex:1}
.shuugi-inp{width:72px;background:#050f08;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 10px;font-size:16px;font-weight:700;text-align:center;outline:none}
.adj-circ{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.adj-circ:active{opacity:.6}

.gap8{display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:8px}
.row>.btn{flex:1}
.pos{color:var(--success)}
.neg{color:var(--danger)}
.muted{color:var(--muted)}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.danger-zone{background:#1a0505;border:1px solid #5a1515;border-radius:12px;padding:12px 14px}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slideUp .2s}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

/* ── Constants ── */
const WINDS=['東','南','西','北'];
const RANK_ICONS=['🥇','🥈','🥉','4️⃣'];
const REG_KEY='mj_reg_v2';const SES_KEY='mj_ses_v2';
const FU_LIST=[20,25,30,40,50,60,70,80,90,100];
const MANGAN_LEVELS=['mangan','haneman','baiman','sanbaiman','yakuman'];
const MANGAN_LABELS={mangan:'満貫',haneman:'跳満',baiman:'倍満',sanbaiman:'三倍満',yakuman:'役満'};
const MANGAN_BASE={mangan:2000,haneman:3000,baiman:4000,sanbaiman:6000,yakuman:8000};
const UMA4_PRESETS=[
  {key:'none',label:'なし',val:[0,0,0,0]},
  {key:'5-10',label:'5-10',val:[10,5,-5,-10]},
  {key:'10-20',label:'10-20',val:[20,10,-10,-20]},
  {key:'mleague',label:'Mリーグ\n10-30',val:[30,10,-10,-30],ml:true},
];
const UMA3_PRESETS=[
  {key:'none',label:'なし',val:[0,0,0]},
  {key:'5-15',label:'5-15',val:[15,0,-15]},
  {key:'10-20',label:'10-20',val:[20,0,-20]},
];
const CHONBO_PRESETS=[
  {key:'mangan',label:'満貫払い'},{key:'haneman',label:'跳満払い'},
  {key:'baiman',label:'倍満払い'},{key:'yakuman',label:'役満払い'},
];
const RATE_PRESETS=[
  {label:'なし',val:0},{label:'点5\n5円/pt',val:5},{label:'1点\n10円/pt',val:10},
  {label:'2点\n20円/pt',val:20},{label:'5点\n50円/pt',val:50},{label:'10点\n100円/pt',val:100},
];

/* ── Registry ── */
let REG={};
function loadReg(){try{const r=localStorage.getItem(REG_KEY);if(r)REG=JSON.parse(r);}catch(e){}}
function saveReg(){try{localStorage.setItem(REG_KEY,JSON.stringify(REG));}catch(e){}}
function newId(){return'p'+Date.now()+Math.random().toString(36).slice(2,5);}
function addPlayer(name){
  const id=newId();
  REG[id]={id,name,stats:{games:0,hands:0,wins:0,tsumo:0,ron:0,dealIns:0,openHands:0,riichi:0,riichiWins:0,damatenWins:0,nakiWins:0,rank:[0,0,0,0],totalPts:0}};
  saveReg();return id;
}

/* ── Default Rules (Mリーグ準拠) ── */
function defaultRules(){
  return{
    gameType:'hanchan',startPoints:25000,returnPoints:30000,
    uma4:[30,10,-10,-30],uma4raw:'30,10,-10,-30',uma4Key:'mleague',
    uma3:[15,0,-15],uma3raw:'15,0,-15',uma3Key:'5-15',
    okaEnabled:true,oka:20,
    bustEnds:true,chonboLevel:'mangan',
    rate:0,shuugiEnabled:false,shuugiValue:3,
  };
}

/* ── Session ── */
function defaultSession(){
  return{
    screen:'home',prevScreen:'home',
    playerCount:4,selectedIds:[],
    rules:defaultRules(),
    players:[],
    game:{windIdx:0,roundNum:1,honba:0,riichiSticks:0,dealerIdx:0,
          riichiFlags:[false,false,false,false],nakiFlags:[false,false,false,false],
          timerSec:0,timerRunning:false},
    handHistory:[],gameHistory:[],gameCount:0,
    undoStack:[],handInput:null,
    bustPlayerIdx:-1,showScoreTable:false,shuugiCounts:null,
  };
}
let S=defaultSession();
function loadSession(){
  try{
    const raw=localStorage.getItem(SES_KEY);
    if(raw){
      const saved=JSON.parse(raw);
      S={...defaultSession(),...saved,rules:{...defaultRules(),...saved.rules},game:{...defaultSession().game,...saved.game},handInput:null,bustPlayerIdx:-1,showScoreTable:false,shuugiCounts:null};
    }
  }catch(e){}
}
function save(){try{localStorage.setItem(SES_KEY,JSON.stringify({...S,handInput:null,bustPlayerIdx:-1,showScoreTable:false,shuugiCounts:null}));}catch(e){}}

/* ── Timer ── */
let _timer=null;
function startTimer(){if(_timer||!S.game.timerRunning)return;_timer=setInterval(()=>{S.game.timerSec++;const el=document.getElementById('tc-timer');if(el)el.textContent=fmtT(S.game.timerSec);},1000);}
function stopTimer(){clearInterval(_timer);_timer=null;}
function fmtT(s){return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;}

/* ── Point Calc ── */
function roundUp100(n){return Math.ceil(n/100)*100;}
function getBase(han,fu,ml){
  if(ml)return MANGAN_BASE[ml]||2000;
  if(han>=13)return MANGAN_BASE.yakuman;if(han>=11)return MANGAN_BASE.sanbaiman;
  if(han>=8)return MANGAN_BASE.baiman;if(han>=6)return MANGAN_BASE.haneman;
  if(han>=5)return MANGAN_BASE.mangan;
  return Math.min(fu*Math.pow(2,han+2),MANGAN_BASE.mangan);
}
function handLabel(han,fu,ml){
  if(ml)return MANGAN_LABELS[ml];
  if(han>=13)return'数え役満';if(han>=11)return'三倍満';if(han>=8)return'倍満';
  if(han>=6)return'跳満';if(han>=5||fu*Math.pow(2,han+2)>=2000)return'満貫';
  return`${han}翻${fu}符`;
}
function calcDeltas(hi){
  const{type,winnerIdx,discarderIdx,han,fu,manganLevel:ml,playerCount:pc,dealerIdx,honba,riichiSticks,tenpaiFlags}=hi;
  const d=new Array(pc).fill(0);
  if(type==='ryukyoku'){
    const tc=tenpaiFlags.filter(Boolean).length;
    if(tc===0||tc===pc)return d;
    const g=Math.floor(3000/tc),p=Math.floor(3000/(pc-tc));
    for(let i=0;i<pc;i++)d[i]=tenpaiFlags[i]?g:-p;return d;
  }
  if(type==='chonbo'){
    const base=MANGAN_BASE[S.rules.chonboLevel]||2000;
    const pay=(winnerIdx===dealerIdx)?roundUp100(base*6):roundUp100(base*4);
    for(let i=0;i<pc;i++)if(i!==winnerIdx){d[i]+=pay;d[winnerIdx]-=pay;}return d;
  }
  const base=getBase(han,fu,ml);const wid=winnerIdx===dealerIdx;
  if(type==='tsumo'){
    if(wid){const e=roundUp100(base*2)+honba*100;for(let i=0;i<pc;i++)if(i!==winnerIdx){d[i]-=e;d[winnerIdx]+=e;}}
    else{for(let i=0;i<pc;i++){if(i===winnerIdx)continue;const a=(i===dealerIdx?roundUp100(base*2):roundUp100(base))+honba*100;d[i]-=a;d[winnerIdx]+=a;}}
    d[winnerIdx]+=riichiSticks*1000;
  }else{
    const ron=(wid?roundUp100(base*6):roundUp100(base*4))+honba*300;
    d[discarderIdx]-=ron;d[winnerIdx]+=ron+riichiSticks*1000;
  }
  return d;
}
function previewRows(hi){
  const{type,winnerIdx,discarderIdx,han,fu,manganLevel:ml,playerCount:pc,dealerIdx,honba,riichiSticks}=hi;
  if(type==='ryukyoku'||type==='chonbo')return null;
  const base=getBase(han,fu,ml);const wid=winnerIdx===dealerIdx;const rows=[];
  if(type==='tsumo'){
    if(wid)rows.push({l:'各プレイヤー支払',a:`-${fmt(roundUp100(base*2)+honba*100)}`});
    else{rows.push({l:'親支払',a:`-${fmt(roundUp100(base*2)+honba*100)}`});rows.push({l:'子支払',a:`-${fmt(roundUp100(base)+honba*100)}`});}
    rows.push({l:`${S.players[winnerIdx]?.name}受取`,a:`+${fmt(calcDeltas({...hi})[winnerIdx])}`,pos:true});
  }else{
    const ron=(wid?roundUp100(base*6):roundUp100(base*4))+honba*300;
    rows.push({l:`${S.players[discarderIdx]?.name}支払`,a:`-${fmt(ron)}`});
    rows.push({l:`${S.players[winnerIdx]?.name}受取`,a:`+${fmt(ron+riichiSticks*1000)}`,pos:true});
  }
  if(riichiSticks>0)rows.push({l:`供託×${riichiSticks}`,a:`+${fmt(riichiSticks*1000)}`,pos:true});
  return rows;
}

/* ── Game Logic ── */
function pushUndo(){S.undoStack.push({players:S.players.map(p=>({...p})),game:{...S.game,riichiFlags:[...S.game.riichiFlags],nakiFlags:[...S.game.nakiFlags]}});if(S.undoStack.length>20)S.undoStack.shift();}
function undo(){if(!S.undoStack.length)return;const snap=S.undoStack.pop();S.players=snap.players;S.game=snap.game;S.bustPlayerIdx=-1;save();render();}
function getSW(idx,dlr,pc){return(idx-dlr+pc)%pc;}
function getRoundLabel(){const{windIdx:wi,roundNum:rn}=S.game;const maxW=S.rules.gameType==='hanchan'?2:1;return`${WINDS[wi]}${rn}局${wi===maxW-1&&rn===S.playerCount?'（オーラス）':''}`;}
function getRanks(){return S.players.slice(0,S.playerCount).map((p,i)=>S.players.slice(0,S.playerCount).filter((q,j)=>q.score>p.score||(q.score===p.score&&j<i)).length+1);}
function declareRiichi(idx){if(S.players[idx].score<1000||S.game.riichiFlags[idx]||S.game.nakiFlags[idx])return;pushUndo();S.players[idx].score-=1000;S.game.riichiFlags[idx]=true;S.game.riichiSticks++;checkBust(idx);save();render();}
function declareNaki(idx){pushUndo();S.game.nakiFlags[idx]=!S.game.nakiFlags[idx];save();render();}
function checkBust(idx){if(S.players[idx].score<0)S.bustPlayerIdx=idx;}
function advRound(){const maxW=S.rules.gameType==='hanchan'?2:1;S.game.dealerIdx=(S.game.dealerIdx+1)%S.playerCount;if(S.game.roundNum<S.playerCount)S.game.roundNum++;else if(S.game.windIdx<maxW-1){S.game.windIdx++;S.game.roundNum=1;}}

function applyHand(hi){
  pushUndo();
  const deltas=calcDeltas(hi);
  deltas.forEach((d,i)=>{if(i<S.playerCount)S.players[i].score+=d;});
  S.players.slice(0,S.playerCount).forEach((_,i)=>checkBust(i));
  if(hi.type!=='ryukyoku'&&hi.type!=='chonbo'){
    S.players.slice(0,S.playerCount).forEach((p,i)=>{
      const r=REG[p.id];if(!r)return;
      r.stats.hands++;
      if(i===hi.winnerIdx){
        r.stats.wins++;if(hi.type==='tsumo')r.stats.tsumo++;else r.stats.ron++;
        if(hi.isOpenHand){r.stats.openHands++;r.stats.nakiWins=( r.stats.nakiWins||0)+1;}
        else if(S.game.riichiFlags[i]){r.stats.riichiWins=(r.stats.riichiWins||0)+1;}
        else{r.stats.damatenWins=(r.stats.damatenWins||0)+1;}
      }
      if(hi.type==='ron'&&i===hi.discarderIdx)r.stats.dealIns++;
      if(S.game.riichiFlags[i])r.stats.riichi++;
    });
    saveReg();
  }
  S.handHistory.push({round:getRoundLabel(),honba:S.game.honba,type:hi.type,label:hi.type==='ryukyoku'?'流局':hi.type==='chonbo'?'チョンボ':handLabel(hi.han,hi.fu,hi.manganLevel),deltas:[...deltas]});
  S.game.nakiFlags=new Array(S.playerCount).fill(false);
  if(hi.type==='ryukyoku'){const dlrT=hi.tenpaiFlags?.[S.game.dealerIdx]||false;S.game.honba++;S.game.riichiFlags=new Array(S.playerCount).fill(false);if(!dlrT)advRound();}
  else if(hi.type!=='chonbo'){const wd=hi.winnerIdx===S.game.dealerIdx;S.game.riichiFlags=new Array(S.playerCount).fill(false);if(wd){S.game.honba++;S.game.riichiSticks=0;}else{S.game.honba=0;S.game.riichiSticks=0;advRound();}}
  S.handInput=null;save();render();
}

function calcResults(){
  const uma=S.playerCount===4?S.rules.uma4:S.rules.uma3;
  const ret=S.rules.returnPoints;const ranks=getRanks();
  return S.players.slice(0,S.playerCount).map((p,i)=>{
    const rank=ranks[i];const umaVal=uma[rank-1]??0;const rawPts=Math.round((p.score-ret)/1000);
    const okaVal=S.rules.okaEnabled&&rank===1?S.rules.oka:0;
    return{idx:i,name:p.name,score:p.score,rank,uma:umaVal,oka:okaVal,rawPts,total:rawPts+umaVal+okaVal,shuugi:0};
  });
}

function endGame(){
  if(S.rules.shuugiEnabled){S.shuugiCounts=new Array(S.playerCount).fill(0);S.screen='shuugi';save();render();return;}
  finalizeGame(null);
}

function finalizeGame(shuugiCounts){
  const results=calcResults();
  if(shuugiCounts){shuugiCounts.forEach((cnt,i)=>{const b=cnt*S.rules.shuugiValue;results[i].total+=b;results[i].shuugi=b;});}
  results.forEach(r=>{S.players[r.idx].total+=r.total;const p=REG[S.players[r.idx].id];if(p){p.stats.games++;p.stats.rank[r.rank-1]++;p.stats.totalPts+=r.total;}});
  saveReg();
  S.gameHistory.push({date:new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),gameType:S.rules.gameType,gameNum:S.gameCount+1,results:results.map(r=>({...r}))});
  S.gameCount++;stopTimer();S.game.timerRunning=false;S.screen='result';save();render();
}

function nextGame(){
  S.players.slice(0,S.playerCount).forEach(p=>{p.score=S.rules.startPoints;p.riichiPaid=false;});
  S.game={windIdx:0,roundNum:1,honba:0,riichiSticks:0,dealerIdx:0,riichiFlags:new Array(S.playerCount).fill(false),nakiFlags:new Array(S.playerCount).fill(false),timerSec:0,timerRunning:true};
  S.undoStack=[];S.handInput=null;S.bustPlayerIdx=-1;S.screen='game';startTimer();save();render();
}

function startGame(){
  document.querySelectorAll('[data-field]').forEach(el=>{
    const k=el.dataset.field;
    if(['startPoints','returnPoints','oka','shuugiValue'].includes(k)){const v=parseInt(el.value,10);if(!isNaN(v))S.rules[k]=v;}
    else if(k==='rate'){const v=parseFloat(el.value);if(!isNaN(v))S.rules[k]=v;}
    else if(k==='uma4raw'){S.rules.uma4raw=el.value;const p=parseUma(el.value);if(p&&p.length===4){S.rules.uma4=p;S.rules.uma4Key='custom';}}
    else if(k==='uma3raw'){S.rules.uma3raw=el.value;const p=parseUma(el.value);if(p&&p.length===3){S.rules.uma3=p;S.rules.uma3Key='custom';}}
  });
  S.players=S.selectedIds.slice(0,S.playerCount).map(id=>({id,name:REG[id]?.name||'?',score:S.rules.startPoints,total:0,riichiPaid:false}));
  S.game={windIdx:0,roundNum:1,honba:0,riichiSticks:0,dealerIdx:0,riichiFlags:new Array(S.playerCount).fill(false),nakiFlags:new Array(S.playerCount).fill(false),timerSec:0,timerRunning:true};
  S.undoStack=[];S.handInput=null;S.bustPlayerIdx=-1;S.gameCount=0;S.gameHistory=[];S.handHistory=[];
  S.screen='game';startTimer();save();render();
}

function setMleague(){S.rules={...defaultRules()};render();}
function parseUma(raw){return(raw||'').split(',').map(v=>parseInt(v.trim(),10)).filter(v=>!isNaN(v));}

/* ── Utilities ── */
function fmt(n){return n.toLocaleString('ja-JP');}
function fmtPt(n){return(n>0?'+':'')+n;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dc(n){return n>0?'pos':n<0?'neg':'muted';}

/* ── Render Score Table ── */
function renderScoreTable(){
  const rows=FU_LIST.map(fu=>{
    const cells=[1,2,3,4].map(han=>{
      const base=fu*Math.pow(2,han+2);
      if(base>=2000||han>=5)return`<td class="td-m">満貫</td>`;
      return`<td>${fmt(roundUp100(base*4))}<br><span class="td-d">${fmt(roundUp100(base*6))}</span></td>`;
    });
    return`<tr><th>${fu}符</th>${cells.join('')}<td class="td-m">8k<br><span class="td-d">12k</span></td></tr>`;
  });
  return`<div class="modal-ov" data-act="closeST"><div class="sheet" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:16px;font-weight:800">点数早見表（ロン）</div><button class="hdr-btn" data-act="closeST">閉じる</button></div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:7px">上: 非親 / <span class="td-d">下: 親</span></div>
    <div style="overflow-x:auto"><table class="score-tbl"><thead><tr><th>符\翻</th><th>1翻</th><th>2翻</th><th>3翻</th><th>4翻</th><th>5翻+</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>
    <div style="margin-top:12px;font-size:11px;color:var(--muted);line-height:1.9">
      <b style="color:var(--text)">満貫ツモ</b> 親4000all / 子2000-4000<br>
      <b style="color:var(--text)">跳満ツモ</b> 親6000all / 子3000-6000<br>
      <b style="color:var(--text)">役満</b> ロン32000(親48000) / ツモ8000-16000

}

  const sorted=[...game.results].sort((a,b)=>a.rank-b.rank);const rate=S.rules.rate;
  const cards=sorted.map(r=>{
    const yen=rate>0?Math.round(r.total*rate):0;
    return`<div class="result-card"><div class="result-rank">${RANK_ICONS[r.rank-1]}</div>
      <div class="result-body"><div class="result-name">${esc(r.name)}</div>
        <div class="result-detail">${fmt(r.score)}点 素${fmtPt(r.rawPts)} ウマ${fmtPt(r.uma)}${r.oka?` オカ+${r.oka}`:''}${r.shuugi?` 祝儀+${r.shuugi}`:''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0"><div class="result-pts ${r.total>=0?'pos':'neg'}">${fmtPt(r.total)}</div>${rate>0?`<div class="result-yen">${yen>=0?'+':''}${yen}円</div>`:''}</div>
    </div>`;
  }).join('');
  const cumul=S.players.slice(0,S.playerCount).map(p=>{const yen=rate>0?Math.round(p.total*rate):0;
    return`<div class="cumul-row"><span style="font-size:14px;font-weight:600">${esc(p.name)}</span>
      <div><span style="font-size:15px;font-weight:800" class="${dc(p.total)}">${fmtPt(p.total)}</span>${rate>0?`<span style="font-size:11px;color:var(--muted);margin-left:6px">(${yen>=0?'+':''}${yen}円)</span>`:''}</div>
    </div>`;}).join('');
  return`<div class="hdr"><div style="width:52px"></div><div class="hdr-title">対局結果</div><button class="hdr-btn" data-act="toHistory">履歴</button></div>
<div class="body"><div class="sec"><div class="sec-lbl">第${game.gameNum}半荘 · ${game.date}</div>${cards}</div>
<div class="sec"><div class="sec-lbl">累計収支</div><div class="cumul">${cumul}</div></div>
<div class="sec gap8"><button class="btn btn-success" style="font-size:17px;padding:15px" data-act="nextGame">次の半荘へ →</button><button class="btn btn-secondary" data-act="toHistory">対局履歴を見る</button><button class="btn btn-secondary" data-act="toHome">ホームに戻る</button></div></div>`;

/* ── Render History ── */
function renderHistory(){
  const hasH=S.gameHistory.length>0;const rate=S.rules.rate;
  const cumul=S.players.slice(0,S.playerCount).map(p=>{const yen=rate>0?Math.round(p.total*rate):0;
    return`<div class="cumul-row"><span style="font-size:14px;font-weight:600">${esc(p.name)}</span>
      <div><span style="font-size:15px;font-weight:800" class="${dc(p.total)}">${fmtPt(p.total)}</span>${rate>0?`<span style="font-size:11px;color:var(--muted);margin-left:6px">(${yen>=0?'+':''}${yen}円)</span>`:''}</div>
    </div>`;}).join('');
  const statsSection=Object.values(REG).map(p=>{
    const st=p.stats;const wr=st.hands>0?Math.round(st.wins/st.hands*100):0;const dr=st.hands>0?Math.round(st.dealIns/st.hands*100):0;const fr=st.hands>0?Math.round(st.openHands/st.hands*100):0;const avg=st.games>0?(st.rank.reduce((s,c,i)=>s+c*(i+1),0)/st.games).toFixed(1):'-';
    return`<div class="hist-item"><div style="font-size:14px;font-weight:700;margin-bottom:8px">${esc(p.name)}</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-val">${st.games}</div><div class="stat-lbl">対局数</div></div>
        <div class="stat-card"><div class="stat-val ${dc(st.totalPts||0)}">${fmtPt(st.totalPts||0)}</div><div class="stat-lbl">累計pt</div></div>
        <div class="stat-card"><div class="stat-val">${wr}%</div><div class="stat-lbl">和了率</div></div>
        <div class="stat-card"><div class="stat-val">${dr}%</div><div class="stat-lbl">放銃率</div></div>
        <div class="stat-card"><div class="stat-val">${fr}%</div><div class="stat-lbl">副露率</div></div>
        <div class="stat-card"><div class="stat-val">${avg}</div><div class="stat-lbl">平均順位</div></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:5px">${st.rank.map((c,i)=>`${i+1}位:${c}回`).join(' / ')}</div>
      ${st.wins>0?`<div style="font-size:10px;color:var(--muted);margin-top:3px">和了内訳 — リーチ:${st.riichiWins||0}回 / ダマテン:${st.damatenWins||0}回 / 副露:${st.nakiWins||0}回</div>`:''}

    </div>`;}).join('');
  const items=[...S.gameHistory].reverse().map(g=>{const sorted=[...g.results].sort((a,b)=>a.rank-b.rank);
    return`<div class="hist-item"><div class="hist-meta">第${g.gameNum}半荘 · ${g.date}</div>
      <div class="hist-ps">${sorted.map(r=>`<div class="hist-p"><div class="hist-p-rank">${r.rank}位</div><div class="hist-p-name">${esc(r.name)}</div><div class="hist-p-pts ${dc(r.total)}">${fmtPt(r.total)}</div></div>`).join('')}</div>
    </div>`;}).join('');
  return`<div class="hdr"><button class="hdr-btn" data-act="backHist">← 戻る</button><div class="hdr-title">履歴・成績</div>${hasH?`<button class="hdr-btn" data-act="exportCSV">CSV</button>`:'<div style="width:52px"></div>'}</div>
<div class="body">
${S.players.length>0?`<div class="sec"><div class="sec-lbl">累計</div><div class="cumul">${cumul}</div></div>`:''}
${Object.keys(REG).length>0?`<div class="sec"><div class="sec-lbl">プレイヤー成績</div>${statsSection}</div>`:''}
${hasH?`<div class="sec"><div class="sec-lbl">対局一覧</div>${items}</div><div class="sec"><button class="btn btn-secondary" data-act="exportCSV">📊 CSVでダウンロード</button></div>`:'<div style="text-align:center;padding:30px 0;color:var(--muted)">対局履歴がありません</div>'}
<div class="sec"><div class="danger-zone"><div class="sec-lbl" style="margin-bottom:8px">データ管理</div><button class="btn btn-danger" style="font-size:13px;padding:11px" data-act="resetAll">全データをリセット</button></div></div>
</div>`;
}

/* ── CSV ── */
function exportCSV(){
  if(!S.gameHistory.length)return;
  const rows=[['対局番号','日時','種別','プレイヤー','最終点数','順位','素点','ウマ','オカ','祝儀','収支','累計']];
  const run={};S.players.slice(0,S.playerCount).forEach(p=>{run[p.name]=0;});
  S.gameHistory.forEach(g=>{g.results.forEach(r=>{run[r.name]=(run[r.name]||0)+r.total;rows.push([g.gameNum,g.date,g.gameType==='hanchan'?'半荘':'東風',r.name,r.score,r.rank,r.rawPts,r.uma,r.oka,r.shuugi||0,r.total,run[r.name]]);});});
  const csv='﻿'+rows.map(r=>r.join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`mahjong_${new Date().toISOString().slice(0,10)}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

/* ── Main Render ── */
function render(){
  stopTimer();const app=document.getElementById('app');
  switch(S.screen){
    case'home':    app.innerHTML=renderHome();    break;
    case'setup':   app.innerHTML=renderSetup();   break;
    case'game':    app.innerHTML=renderGame();    break;
    case'shuugi':  app.innerHTML=renderShuugi();  break;
    case'result':  app.innerHTML=renderResult();  break;
    case'history': app.innerHTML=renderHistory(); break;
    default:       app.innerHTML=renderHome();
  }
  if(S.screen==='game'&&S.game.timerRunning)startTimer();
}

/* ── Events ── */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');if(!el)return;
  const act=el.dataset.act;
  switch(act){
    case'setPC':S.playerCount=parseInt(el.dataset.v);S.selectedIds=S.selectedIds.slice(0,S.playerCount);render();break;
    case'toggleP':{const id=el.dataset.id;const i=S.selectedIds.indexOf(id);if(i>=0)S.selectedIds.splice(i,1);else if(S.selectedIds.length<S.playerCount)S.selectedIds.push(id);render();break;}
    case'removeSeat':S.selectedIds.splice(parseInt(el.dataset.i),1);render();break;
    case'addP':{const inp=document.getElementById('npn');const n=(inp?.value||'').trim();if(n){addPlayer(n);if(inp)inp.value='';}render();break;}
    case'delP':if(confirm(`「${REG[el.dataset.id]?.name}」を削除しますか？`)){delete REG[el.dataset.id];S.selectedIds=S.selectedIds.filter(x=>x!==el.dataset.id);saveReg();}render();break;
    case'toHome':S.prevScreen=S.screen;S.screen='home';save();render();break;
    case'toSetup':S.prevScreen=S.screen;S.screen='setup';save();render();break;
    case'toHistory':S.prevScreen=S.screen;S.screen='history';render();break;
    case'backHist':S.screen=S.prevScreen||'home';render();break;
    case'resumeGame':S.screen='game';save();render();break;
    case'setMleague':setMleague();break;
    case'setGT':S.rules.gameType=el.dataset.v;render();break;
    case'setOka':S.rules.okaEnabled=el.dataset.v==='1';render();break;
    case'setBust':S.rules.bustEnds=el.dataset.v==='1';render();break;
    case'setShuugi':S.rules.shuugiEnabled=el.dataset.v==='1';render();break;
    case'setShuugiVal':S.rules.shuugiValue=parseInt(el.dataset.v);render();break;
    case'setChonbo':S.rules.chonboLevel=el.dataset.v;render();break;
    case'setRate':S.rules.rate=parseFloat(el.dataset.v);render();break;
    case'setUmaPreset':{
      const key=el.dataset.key;const pc=parseInt(el.dataset.pc);
      const presets=pc===4?UMA4_PRESETS:UMA3_PRESETS;
      const p=presets.find(x=>x.key===key);
      if(p){if(pc===4){S.rules.uma4=p.val;S.rules.uma4raw=p.val.join(',');S.rules.uma4Key=key;}else{S.rules.uma3=p.val;S.rules.uma3raw=p.val.join(',');S.rules.uma3Key=key;}}
      render();break;
    }
    case'startGame':startGame();break;
    case'riichi':declareRiichi(parseInt(el.dataset.i));break;
    case'naki':declareNaki(parseInt(el.dataset.i));break;
    case'undo':undo();break;
    case'manAdv':if(confirm('次の局に進みますか？')){pushUndo();S.game.honba=0;S.game.riichiFlags=new Array(S.playerCount).fill(false);S.game.nakiFlags=new Array(S.playerCount).fill(false);advRound();save();render();}break;
    case'endGame':if(confirm('精算しますか？'))endGame();break;
    case'nextGame':nextGame();break;
    case'closeBust':S.bustPlayerIdx=-1;render();break;
    case'showST':S.showScoreTable=true;render();break;
    case'closeST':S.showScoreTable=false;render();break;
    case'openHI':S.handInput={step:1,type:null,winnerIdx:null,discarderIdx:null,han:1,fu:30,manganLevel:null,tenpaiFlags:new Array(S.playerCount).fill(false),isOpenHand:false};render();break;
    case'hiType':S.handInput.type=el.dataset.v;render();break;
    case'hiWinner':S.handInput.winnerIdx=parseInt(el.dataset.i);S.handInput.isOpenHand=S.game.nakiFlags[parseInt(el.dataset.i)];render();break;
    case'hiDiscard':S.handInput.discarderIdx=parseInt(el.dataset.i);render();break;
    case'hiTenpai':{const i=parseInt(el.dataset.i);S.handInput.tenpaiFlags[i]=!S.handInput.tenpaiFlags[i];render();break;}
    case'hiHan':S.handInput.han=Math.max(1,Math.min(13,S.handInput.han+parseInt(el.dataset.v)));S.handInput.manganLevel=null;render();break;
    case'hiFu':S.handInput.fu=parseInt(el.dataset.v);S.handInput.manganLevel=null;render();break;
    case'hiMG':{const v=el.dataset.v;S.handInput.manganLevel=S.handInput.manganLevel===v?null:v;render();break;}
    case'hiNext':{const cb=document.getElementById('hi-open');if(cb)S.handInput.isOpenHand=cb.checked;S.handInput.step=nextStep(S.handInput);render();break;}
    case'hiBack':if(S.handInput.step<=1)S.handInput=null;else S.handInput.step--;render();break;
    case'hiConfirm':{const cb=document.getElementById('hi-open');if(cb)S.handInput.isOpenHand=cb.checked;applyHand({...S.handInput,playerCount:S.playerCount,dealerIdx:S.game.dealerIdx,honba:S.game.honba,riichiSticks:S.game.riichiSticks});break;}
    case'shuugiAdj':{const i=parseInt(el.dataset.i);const v=parseInt(el.dataset.v);if(!S.shuugiCounts)S.shuugiCounts=new Array(S.playerCount).fill(0);S.shuugiCounts[i]=Math.max(0,S.shuugiCounts[i]+v);const inp=document.getElementById(`shuugi-${i}`);if(inp)inp.value=S.shuugiCounts[i];break;}
    case'confirmShuugi':{const counts=S.players.slice(0,S.playerCount).map((_,i)=>Math.max(0,parseInt(document.getElementById(`shuugi-${i}`)?.value||'0',10)||0));finalizeGame(counts);break;}
    case'exportCSV':exportCSV();break;
    case'resetAll':if(confirm('全データをリセットしますか？')){REG={};saveReg();S=defaultSession();save();render();}break;
  }
});

function nextStep(hi){
  const s=hi.step;
  if(s===1)return 2;
  if(s===2){if(hi.type==='ryukyoku')return 99;if(hi.type==='chonbo'&&hi.winnerIdx!=null)return 99;if(hi.type==='ron'&&hi.winnerIdx!=null)return 3;if(hi.type==='tsumo'&&hi.winnerIdx!=null)return 3;return 2;}
  if(s===3){if(hi.type==='ron')return 4;return 99;}
  return 99;
}

document.addEventListener('input',e=>{
  const el=e.target;const k=el.dataset.field;if(!k)return;
  if(['startPoints','returnPoints','oka','shuugiValue'].includes(k)){const v=parseInt(el.value,10);if(!isNaN(v))S.rules[k]=v;}
  else if(k==='rate'){const v=parseFloat(el.value);if(!isNaN(v))S.rules[k]=v;}
  else if(k==='uma4raw'){S.rules.uma4raw=el.value;S.rules.uma4Key='custom';const p=parseUma(el.value);if(p&&p.length===4)S.rules.uma4=p;}
  else if(k==='uma3raw'){S.rules.uma3raw=el.value;S.rules.uma3Key='custom';const p=parseUma(el.value);if(p&&p.length===3)S.rules.uma3=p;}
});

/* ── Init ── */
loadReg();loadSession();render();
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
</script>
